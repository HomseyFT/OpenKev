name: Release

on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile \
            --name OpenKev \
            --add-data "apps/KevAI/static:apps/KevAI/static" \
            --add-data "apps/KevAI/soul.md:apps/KevAI" \
            --add-data "apps/static:apps/static" \
            apps/main.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OpenKev

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pip install pyinstaller pyinstaller-hooks-contrib
          pyinstaller --onefile \
            --name OpenKev \
            --hidden-import PySide6 \
            --hidden-import PySide6.QtCore \
            --hidden-import PySide6.QtWidgets \
            --hidden-import PySide6.QtGui \
            --hidden-import PySide6.QtPrintSupport \
            --collect-all PySide6 \
            --add-data "apps/KevAI/static:apps/KevAI/static" \
            --add-data "apps/KevAI/soul.md:apps/KevAI" \
            --add-data "apps/static:apps/static" \
            apps/main.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OpenKev.exe
